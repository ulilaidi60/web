<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ulil Aidi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .micro-card {
            max-width: 600px;
            width: 100%;
            background: rgba(18, 20, 28, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 2.5rem;
            padding: 2rem 1.75rem;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), 0 0 30px rgba(255, 0, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: neonPulse 4s infinite alternate;
        }

        @keyframes neonPulse {
            0% {
                box-shadow: 0 0 8px rgba(0, 255, 255, 0.4), 0 0 20px rgba(0, 255, 255, 0.2);
                border-color: rgba(0, 255, 255, 0.4);
            }
            33% {
                box-shadow: 0 0 15px rgba(255, 0, 255, 0.6), 0 0 30px rgba(255, 0, 255, 0.3);
                border-color: rgba(255, 0, 255, 0.6);
            }
            66% {
                box-shadow: 0 0 12px rgba(255, 255, 0, 0.5), 0 0 25px rgba(255, 255, 0, 0.3);
                border-color: rgba(255, 255, 0, 0.5);
            }
            100% {
                box-shadow: 0 0 18px rgba(0, 255, 128, 0.6), 0 0 35px rgba(0, 255, 128, 0.3);
                border-color: rgba(0, 255, 128, 0.6);
            }
        }

        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* --- Kunci utama agar avatar selalu simetris dan bulat --- */
        .avatar {
            width: 96px;
            height: 96px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: #2c2e3a;
            /* Memastikan wadah berbentuk persegi sempurna */
            aspect-ratio: 1 / 1;
            /* Mencegah distorsi akibat line-height atau font */
            line-height: 0;
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3b3f5c;
            color: white;
            font-size: 3rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* Gambar memenuhi area tanpa merusak rasio */
            object-position: center; /* Pusatkan gambar */
            display: block;
        }

        .profile h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f1f3f9;
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
        }

        .profile .bio {
            color: #b0b6dd;
            font-size: 0.9rem;
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.4;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0.5rem 0 2rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: #eef2ff;
            font-weight: 500;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 12px;
        }

        .link-btn:hover {
            background: rgba(93, 99, 162, 0.5);
            border-color: rgba(120, 130, 255, 0.7);
            transform: translateY(-2px);
            color: white;
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 14px;
            overflow: hidden;
        }

        .link-left i {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
            color: #b9c0ff;
        }

        .link-text {
            font-size: 1rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-links-message {
            color: #8e94b0;
            text-align: center;
            padding: 1rem;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="micro-card">
    <div class="profile">
        <div class="avatar" id="avatarContainer"></div>
        <h2 id="profileName">...</h2>
        <div class="bio" id="profileBio"></div>
    </div>
    <div class="links-list" id="linksList"></div>
</div>

<script>
    // ============================================================
    // 🔧 KONFIGURASI – Ubah sesuai keinginan
    // ============================================================
    const profile = {
        name: "Ulil Aidi",
        bio: "MAN 2 Grobogan",
        // Gunakan URL gambar yang sudah dipastikan bisa diakses publik
        avatarUrl: "https://i.ibb.co.com/bMyTGvND/25539232-MUHAMAD-ULIL-AIDI-Foto.png"
    };

    const links = [
        { text: "Kelas 11-3", url: "https://docs.google.com/spreadsheets/d/16uN2tZ87m8CgnLWRZ0oiFuNzdZzwRFRP/edit?usp=sharing&ouid=109156060581254214137&rtpof=true&sd=true", hidden: false },
        { text: "Kelas 11-4", url: "https://docs.google.com/spreadsheets/d/1AKUOnv5yRBBdCmOIPM42_Q1CkftAwXmC/edit?usp=drive_link&ouid=109156060581254214137&rtpof=true&sd=true", hidden: false },
        { text: "Instagram", url: "https://instagram.com/", hidden: true },
        { text: "TikTok (contoh tersembunyi)", url: "https://tiktok.com/@", hidden: true },
        { text: "YouTube Channel", url: "https://youtube.com/", hidden: true }
    ];
    // ============================================================

    function renderProfile() {
        document.getElementById("profileName").innerText = profile.name || "Pengguna";
        document.getElementById("profileBio").innerText = profile.bio || "";
        const avatarContainer = document.getElementById("avatarContainer");
        const initial = (profile.name ? profile.name.charAt(0).toUpperCase() : "U");
        if (profile.avatarUrl && profile.avatarUrl.trim()) {
            // Coba muat gambar; jika gagal, fallback ke inisial
            avatarContainer.innerHTML = `<img src="${profile.avatarUrl}" alt="avatar" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\"avatar-fallback\">${initial}</div>';">`;
        } else {
            avatarContainer.innerHTML = `<div class="avatar-fallback">${initial}</div>`;
        }
    }

    function renderLinks() {
        const container = document.getElementById("linksList");
        const visibleLinks = links.filter(link => !link.hidden);
        if (visibleLinks.length === 0) {
            container.innerHTML = `<div class="empty-links-message">✨ Tidak ada tautan yang ditampilkan saat ini.</div>`;
            return;
        }
        container.innerHTML = "";
        visibleLinks.forEach(link => {
            const a = document.createElement("a");
            a.className = "link-btn";
            a.href = link.url && link.url !== "#" ? link.url : "#";
            a.target = "_blank";
            const leftDiv = document.createElement("div");
            leftDiv.className = "link-left";
            let iconClass = "fas fa-link";
            const lower = link.text.toLowerCase();
            if (lower.includes("instagram")) iconClass = "fab fa-instagram";
            else if (lower.includes("tiktok")) iconClass = "fab fa-tiktok";
            else if (lower.includes("youtube")) iconClass = "fab fa-youtube";
            else if (lower.includes("github")) iconClass = "fab fa-github";
            else if (lower.includes("twitter")) iconClass = "fab fa-twitter";
            leftDiv.innerHTML = `<i class="${iconClass}"></i><span class="link-text">${escapeHtml(link.text)}</span>`;
            a.appendChild(leftDiv);
            a.appendChild(document.createElement("i")).className = "fas fa-arrow-right";
            container.appendChild(a);
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderProfile();
    renderLinks();
</script>
</body>
</html>
